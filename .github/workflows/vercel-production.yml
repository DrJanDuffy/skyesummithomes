# Deploy LetMeHelpYouREALTY/skyesummithomes to Vercel production.
# Vercel Git is still linked to DrJanDuffy/skyesummithomes — this workflow
# deploys from the canonical org repo when VERCEL_TOKEN is set in GitHub secrets.

name: Deploy to Vercel (production)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-production-skyesummithomes
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Deploy to Vercel production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_EIbjFXaDDtGMTweb5Hvo3CG3
          VERCEL_PROJECT_ID: prj_x5YkBzbd8OFKPbnKslImQEbaYuUT
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::Add VERCEL_TOKEN to GitHub repo secrets (LetMeHelpYouREALTY/skyesummithomes)."
            echo "Create at https://vercel.com/account/tokens — scope: deploy for skyesummithomes."
            exit 1
          fi
          npx vercel@54 deploy --prod --yes --token="$VERCEL_TOKEN"
